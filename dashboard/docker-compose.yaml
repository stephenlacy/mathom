services:

  dashboard:
    build: 
      dockerfile: ./Dashboard.Dockerfile
      args:
        BETTER_AUTH_SECRET: TvHZtJnnzEXbFhyq3IZeD5WUyBWowqwy
        BETTER_AUTH_URL: http://dashboard:5050
        DATABASE_URL: 'postgresql://postgres:postgres@postgres:5432/main'
        MATHOM_RUNTIME: 'docker'
        MATHOM_RUNTIME_URL: "http://runtime:9090"
        NEXT_PUBLIC_MATHOM_RUNTIME_URL: "http://localhost:9090"
        NODE_ENV: 'production'
    command: sh -c 'pnpm run db:migrate && pnpm dev'
    ports:
      - '5050:5050'
    environment:
      - BETTER_AUTH_SECRET=TvHZtJnnzEXbFhyq3IZeD5WUyBWowqwy
      - BETTER_AUTH_URL=http://dashboard:5050
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/main
      - MATHOM_RUNTIME=docker
      - MATHOM_RUNTIME_URL=http://runtime:9090
      - NEXT_PUBLIC_MATHOM_RUNTIME_URL=http://localhost:9090
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=5050
    depends_on:
      postgres:
        condition: service_healthy


  runtime:
    environment:
      - LOG_URL=http://dashboard:5050/api/v1/instances


  postgres:
    image: postgres:17
    command: '-d 1'
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '54320:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=main
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  db_data:
